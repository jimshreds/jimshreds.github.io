name: Run metadata and open PR

on:
  push:
    branches: [ master ]
    paths:
      - '_posts/**radioshow.md'
  workflow_dispatch:

jobs:
  run-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run metadata script
        run: |
          python3 scripts/fetch_archive_metadata.py --all --backup --head-fallback --report scripts/archive_report.json || true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

      - name: Check for changes and create branch
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            BRANCH_NAME="metadata-run-$(date +%Y%m%d-%H%M%S)"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
            git checkout -b "$BRANCH_NAME"
            git commit -m "chore: update podcast metadata (automated)"
            git push origin "$BRANCH_NAME"
          fi

      - name: Set up Ruby
        if: steps.changes.outputs.has_changes == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install Bundler and gems
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          gem install bundler
          bundle install --jobs 4 --retry 3

      - name: Build site and validate feed
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          bundle exec jekyll build > build_output.txt 2>&1 || true
          if xmllint --noout _site/feed.podcast.xml 2> xmllint_output.txt; then
            echo "xmllint: OK" >> xmllint_output.txt
          else
            echo "xmllint: FAILED" >> xmllint_output.txt
          fi

      - name: Prepare PR body
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          {
            echo "Automated metadata update."
            echo ""
            echo "## Metadata script report"
            echo ""
            if [ -f scripts/archive_report.json ]; then
              python3 -m json.tool scripts/archive_report.json 2>/dev/null || cat scripts/archive_report.json
            else
              echo "No report generated."
            fi
            echo ""
            echo "## Build output (last 200 lines)"
            echo ""
            tail -n 200 build_output.txt 2>/dev/null || echo "No build output."
            echo ""
            echo "## xmllint output"
            echo ""
            cat xmllint_output.txt 2>/dev/null || echo "No xmllint output."
          } > pr_body.md

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Automated: Update podcast metadata" \
            --base master \
            --head "${{ steps.changes.outputs.branch_name }}" \
            --body-file pr_body.md
